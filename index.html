<!DOCTYPE html>
<html>
<head>
    <title>Hiyasa Abaya Designs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0d0d0d;
            color: white;
        }

        header {
            background: black;
            color: gold;
            padding: 20px;
            text-align: center;
            font-size: 26px;
            letter-spacing: 2px;
        }

        nav {
            background: #111;
            text-align: center;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: gold;
        }

        .hero {
            text-align: center;
            padding: 50px;
            background: #222;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 30px;
        }

        .card {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 15px;
            width: 220px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        footer {
            background: black;
            color: gold;
            text-align: center;
            padding: 20px;
        }

        .whatsapp-button {
            display: inline-block;
            background: gold;
            color: black;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin: 20px 0;
        }

        .whatsapp-button:hover {
            background: #e6b800;
        }

    </style>
</head>
<body>

<header>
    Hiya Abaya Designs
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Designs</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Elegant Abaya Collection</h2>
    <p>Luxury & Modern Designs ✨</p>
</section>

<section class="gallery">

    <div class="card">
        <img src="images/abaya1.jpg" alt="Classic Black Abaya">
        <p>Classic Black Abaya</p>
    </div>

    <div class="card">
        <img src="images/abaya2.jpg" alt="Beads Work Abaya">
        <p>Beads Work Abaya</p>
    </div>

    <div class="card">
        <img src="images/abaya3.jpg" alt="Modern Open Abaya">
        <p>Modern Open Abaya</p>
    </div>

</section>

<div style="text-align:center;">
    <a class="whatsapp-button" href="https://wa.me/947XXXXXXXX">
        Order on WhatsApp
    </a>
</div>

<footer>
    Contact: fhiyasa@email.com
</footer>

</body>
</html>
