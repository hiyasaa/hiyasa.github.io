<!DOCTYPE html>
<html>
<head>
<title>Hiyasa Fashion Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0b0b;
    color:white;
}

/* HEADER */
header {
    padding:15px;
    background:black;
    color:gold;
    text-align:center;
    font-size:22px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    padding:15px;
}

.card {
    background:#1a1a1a;
    border-radius:12px;
    overflow:hidden;
    text-align:center;
}

.card img {
    width:100%;
    height:220px;
    object-fit:cover;
}

.price {
    color:gold;
    font-weight:bold;
}

.btn {
    background:gold;
    color:black;
    border:none;
    padding:8px;
    margin:10px;
    border-radius:5px;
    cursor:pointer;
}

/* CART */
.cart {
    position:fixed;
    top:0;
    right:0;
    width:320px;
    height:100%;
    background:#111;
    padding:15px;
    overflow:auto;
    display:none;
}

.item {
    border-bottom:1px solid #333;
    padding:10px 0;
}

.item button {
    margin:3px;
    padding:5px;
    border:none;
    border-radius:5px;
}

.total {
    color:gold;
    font-size:18px;
}

/* FORM */
input, textarea, select {
    width:100%;
    padding:8px;
    margin:5px 0;
    border:none;
    border-radius:5px;
}

/* BUTTONS */
.checkout {
    background:green;
    color:white;
    padding:10px;
    border:none;
    width:100%;
    margin-top:10px;
}

.open-cart {
    position:fixed;
    bottom:20px;
    right:20px;
    background:gold;
    color:black;
    padding:12px;
    border-radius:50px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
Hiyasa Fashion Shop 🛍️
</header>

<!-- PRODUCTS -->
<div class="grid">

<div class="card">
<img src="images/abaya1.jpg">
<p>Classic Abaya</p>
<p class="price">4500 LKR</p>
<button class="btn" onclick="addToCart('Classic Abaya',4500)">Add to Cart</button>
</div>

<div class="card">
<img src="images/abaya2.jpg">
<p>Beads Style</p>
<p class="price">6500 LKR</p>
<button class="btn" onclick="addToCart('Beads Style',6500)">Add to Cart</button>
</div>

<div class="card">
<img src="images/abaya3.jpg">
<p>Open Style</p>
<p class="price">5500 LKR</p>
<button class="btn" onclick="addToCart('Open Style',5500)">Add to Cart</button>
</div>

<div class="card">
<img src="images/abaya4.jpg">
<p>Luxury Design</p>
<p class="price">7000 LKR</p>
<button class="btn" onclick="addToCart('Luxury Design',7000)">Add to Cart</button>
</div>

</div>

<!-- CART -->
<div class="cart" id="cart">

<h2>Your Cart 🛒</h2>
<div id="cartItems"></div>

<p class="total">Total: LKR <span id="total">0</span></p>

<h3>Customer Details</h3>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>

<h3>Payment Method</h3>
<select id="payment">
<option value="">Select Payment</option>
<option>Cash on Delivery</option>
<option>Bank Transfer</option>
</select>

<button class="checkout" onclick="checkout()">Checkout WhatsApp</button>
<button class="btn" onclick="closeCart()">Close</button>

</div>

<!-- CART BUTTON -->
<div class="open-cart" onclick="openCart()">
🛒 Cart (<span id="count">0</span>)
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price){
    let item = cart.find(i => i.name === name);
    if(item){
        item.qty++;
    } else {
        cart.push({name, price, qty:1});
    }
    saveCart();
    updateCart();
}

function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCart(){
    let c = document.getElementById("cartItems");
    c.innerHTML="";
    let total=0;

    cart.forEach((i,index)=>{
        total += i.price*i.qty;

        c.innerHTML += `
        <div class="item">
        <b>${i.name}</b><br>
        ${i.price} × ${i.qty}
        <div>
        <button onclick="changeQty(${index},-1)">➖</button>
        <button onclick="changeQty(${index},1)">➕</button>
        <button onclick="removeItem(${index})">❌</button>
        </div>
        </div>`;
    });

    document.getElementById("total").innerText=total;
    document.getElementById("count").innerText=cart.length;
}

function changeQty(i,change){
    cart[i].qty+=change;
    if(cart[i].qty<=0) cart.splice(i,1);
    saveCart();
    updateCart();
}

function removeItem(i){
    cart.splice(i,1);
    saveCart();
    updateCart();
}

function openCart(){
    document.getElementById("cart").style.display="block";
    updateCart();
}

function closeCart(){
    document.getElementById("cart").style.display="none";
}

function checkout(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let payment=document.getElementById("payment").value;

if(name==""||phone==""||address==""||payment==""){
alert("Fill all details!");
return;
}

let msg="🛍️ New Order:%0A";
msg+="Name: "+name+"%0A";
msg+="Phone: "+phone+"%0A";
msg+="Address: "+address+"%0A";
msg+="Payment: "+payment+"%0A%0A";

let total=0;

cart.forEach(i=>{
msg+="- "+i.name+" x"+i.qty+" ("+(i.price*i.qty)+" LKR)%0A";
total+=i.price*i.qty;
});

msg+="%0ATotal: "+total+" LKR";

window.open("https://wa.me/94778778685?text="+msg);

}

updateCart();

</script>

</body>
</html>
