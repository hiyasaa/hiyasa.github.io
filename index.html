<!DOCTYPE html>
<html>
<head>
    <title>Hiyasa Abaya Designs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0d0d0d;
            color: white;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: black;
            padding: 15px;
        }

        header h1 {
            color: gold;
            font-size: 24px;
        }

        /* SLIDER */
        .slider {
            width: 100%;
            text-align: center;
            margin-top: 10px;
        }

        .slider img {
            width: 90%;
            max-height: 300px;
            border-radius: 15px;
        }

        /* GALLERY */
        .scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 20px;
        }

        .card {
            min-width: 220px;
            background: #1a1a1a;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
        }

        .price {
            color: gold;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            background: gold;
            color: black;
            padding: 8px 12px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 5px;
        }

        /* POPUP */
        #popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            justify-content: center;
            align-items: center;
        }

        #popup img {
            max-width: 90%;
            max-height: 90%;
        }

        #popup span {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 30px;
            cursor: pointer;
        }

        /* WHATSAPP FLOAT */
        .wa {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: green;
            color: white;
            padding: 12px 15px;
            border-radius: 50px;
            text-decoration: none;
        }

    </style>
</head>

<body>

<!-- HEADER -->
<header>
    <img src="https://via.placeholder.com/40" style="border-radius:50%;">
    <h1>Hiyasa Abaya Designs</h1>
</header>

<!-- SLIDER -->
<div class="slider">
    <img id="slide" src="images/abaya1.jpg">
</div>

<!-- GALLERY -->
<div class="scroll-container">

    <div class="card">
        <img src="images/abaya1.jpg" onclick="openPopup(this.src)">
        <p>Classic Black</p>
        <p class="price">LKR 4500</p>
        <a class="btn" href="https://wa.me/947XXXXXXXX?text=I want Classic Black">Order</a>
    </div>

    <div class="card">
        <img src="images/abaya2.jpg" onclick="openPopup(this.src)">
        <p>Beads Work</p>
        <p class="price">LKR 6500</p>
        <a class="btn" href="https://wa.me/947XXXXXXXX?text=I want Beads Work">Order</a>
    </div>

    <div class="card">
        <img src="images/abaya3.jpg" onclick="openPopup(this.src)">
        <p>Open Style</p>
        <p class="price">LKR 5500</p>
        <a class="btn" href="https://wa.me/947XXXXXXXX?text=I want Open Style">Order</a>
    </div>

    <div class="card">
        <img src="images/abaya4.jpg" onclick="openPopup(this.src)">
        <p>Luxury Design</p>
        <p class="price">LKR 7000</p>
        <a class="btn" href="https://wa.me/947XXXXXXXX?text=I want Luxury Design">Order</a>
    </div>

    <div class="card">
        <img src="images/abaya5.jpg" onclick="openPopup(this.src)">
        <p>Simple Style</p>
        <p class="price">LKR 4000</p>
        <a class="btn" href="https://wa.me/947XXXXXXXX?text=I want Simple Style">Order</a>
    </div>

    <div class="card">
        <img src="images/abaya6.jpg" onclick="openPopup(this.src)">
        <p>Modern Cut</p>
        <p class="price">LKR 6000</p>
        <a class="btn" href="https://wa.me/947XXXXXXXX?text=I want Modern Cut">Order</a>
    </div>

    <div class="card">
        <img src="images/abaya7.jpg" onclick="openPopup(this.src)">
        <p>Premium Black</p>
        <p class="price">LKR 7500</p>
        <a class="btn" href="https://wa.me/947XXXXXXXX?text=I want Premium Black">Order</a>
    </div>

</div>

<!-- POPUP -->
<div id="popup">
    <span onclick="closePopup()">&times;</span>
    <img id="popup-img">
</div>

<!-- WHATSAPP FLOAT -->
<a class="wa" href="https://wa.me/947XXXXXXXX">WhatsApp</a>

<!-- SCRIPTS -->
<script>

// IMAGE POPUP
function openPopup(src) {
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popup-img").src = src;
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

// AUTO SLIDER
let images = [
    "images/abaya1.jpg",
    "images/abaya2.jpg",
    "images/abaya3.jpg",
    "images/abaya4.jpg"
];

let i = 0;

setInterval(() => {
    i = (i + 1) % images.length;
    document.getElementById("slide").src = images[i];
}, 3000);

</script>

</body>
</html>
